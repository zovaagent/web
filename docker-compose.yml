services:
  postgres:
    image: postgres:16-alpine
    container_name: zova-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: zova
      POSTGRES_USER: zova
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zova_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zova -d zova"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
